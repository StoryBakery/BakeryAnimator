name = "storybakery/blender_to_roblox_animation"
version = "0.1.0"
license = "GPL-3.0-only"

[target]
environment = "luau"

[indices]
default = "https://github.com/pesde-pkg/index"

[scripts]
roblox_sync_config_generator = ".pesde/scripts/roblox_sync_config_generator.luau"
sourcemap_generator = ".pesde/scripts/sourcemap_generator.luau"

[dev_dependencies]
scripts = { name = "pesde/scripts_rojo", version = "^0.2.0", target = "lune" }
rojo = { name = "pesde/rojo", version = "^7.5.1", target = "lune" }


[engines]
pesde = "^0.7.0"
lune = "^0.10.2"

[dependencies]
TypeInfos = { repo = "https://github.com/StoryBakery/TypeInfos", rev = "v0.1.0" }
LinearInterpolation = { repo = "https://github.com/StoryBakery/LinearInterpolation", rev = "v0.1.0" }
MathUtil = { repo = "https://github.com/StoryBakery/MathUtil", rev = "v0.1.0" }
BezierUtil = { repo = "https://github.com/StoryBakery/BezierUtil", rev = "v0.1.0" }
ValueByPriority = { repo = "https://github.com/StoryBakery/ValueByPriority", rev = "v0.1.0" }
StateObject = { repo = "https://github.com/StoryBakery/StateObject", rev = "v0.1.0" }
